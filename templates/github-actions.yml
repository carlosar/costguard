name: CostGuard

on:
  pull_request:
    branches: [main, master]
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'

jobs:
  analyze:
    name: Firebase Cost Risk Analysis
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CostGuard
        run: npx costguard src/ --json > costguard-report.json || true

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try { report = JSON.parse(fs.readFileSync('costguard-report.json', 'utf8')); }
            catch { console.log('CostGuard: no report found.'); return; }

            const { results, blocked } = report;

            if (!results || results.length === 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo:  context.repo.repo,
                body:  '## ✅ CostGuard\n\nNo Firebase cost risks detected in changed files.',
              });
              return;
            }

            const riskIcon  = (l) => l === 'HIGH' ? '🔴 HIGH' : l === 'MEDIUM' ? '🟡 MEDIUM' : '🟢 LOW';
            const scoreIcon = (n) => n >= 50 ? '🔴' : n >= 25 ? '🟡' : '🟢';

            let table =
              '| File | Score | Cost | Scalability | Memory Leak | Violations |\n' +
              '|---|---|---|---|---|---|\n';
            for (const r of results) {
              table += `| \`${r.file}\` | ${scoreIcon(r.score.overall)} ${r.score.overall}/100 | ${riskIcon(r.score.costRisk)} | ${riskIcon(r.score.scalabilityRisk)} | ${riskIcon(r.score.memoryLeakRisk)} | ${r.violations.length} |\n`;
            }

            let details = '';
            for (const r of results) {
              details += `\n### \`${r.file}\`\n`;
              for (const v of r.violations) {
                const icon = v.severity === 'error' ? '❌' : '⚠️';
                details += `- ${icon} **Line ${v.line}** \`[${v.code}]\` — ${v.message}\n`;
              }
            }

            const totalViolations = results.reduce((n, r) => n + r.violations.length, 0);
            const status = blocked
              ? `❌ **${totalViolations} HIGH risk violation${totalViolations !== 1 ? 's' : ''} — review required before merging**`
              : `⚠️ **${totalViolations} warning${totalViolations !== 1 ? 's' : ''} found** (below blocking threshold)`;

            const body =
              `## CostGuard Report\n\n${status}\n\n${table}\n` +
              `<details>\n<summary>Violation details</summary>\n\n${details}\n</details>`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body,
            });

            if (blocked) {
              core.setFailed(`CostGuard: ${totalViolations} HIGH risk violation(s) found. Fix before merging.`);
            }
